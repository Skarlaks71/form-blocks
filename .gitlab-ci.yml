image: node:latest

stages:
  - build
  - publish

# Faz o build de todos os pacotes do monorepo
build_all:
  stage: build
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - packages/*/dist/

# Template base para a publicação via Trusted Publishing
.publish_template:
  stage: publish
  id_token:
    NPM_TOKEN:
      aud: https://www.npmjs.com
  script:
    - echo "//registry.npmjs.org/:_authToken=\${NPM_TOKEN}" > .npmrc
    - cd packages/${PACKAGE_DIR}
    - npm publish --provenance --access public
  rules:
    - if: $CI_COMMIT_TAG # Só roda quando você cria uma tag (ex: v1.0.0)

# Publica o Core
publish_core:
  extends: .publish_template
  variables:
    PACKAGE_DIR: "core"

# Publica o Styles
publish_styles:
  extends: .publish_template
  variables:
    PACKAGE_DIR: "styles"

# Publica o Vue
publish_vue:
  extends: .publish_template
  variables:
    PACKAGE_DIR: "vue"
  needs: ["publish_core", "publish_styles"] # Garante a ordem correta